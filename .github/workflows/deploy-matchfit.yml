name: Deploy MatchFit to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'matchfit/**'
      - '.github/workflows/deploy-matchfit.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: matchfit/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: matchfit

      - name: Build
        run: npx ng build --base-href /angular_training/
        working-directory: matchfit

      # SPA fallback so deep links like /progress don't 404 on Pages
      - name: Add 404 fallback
        run: cp matchfit/dist/matchfit/browser/index.html matchfit/dist/matchfit/browser/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: matchfit/dist/matchfit/browser

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
